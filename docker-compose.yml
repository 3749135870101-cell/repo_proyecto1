version: '3.8'
services:
  db:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: productos_db
    ports:
      - "3306:3306"

  backend:
    build: ./Backend/API-Product-Exa... # Ajusta al nombre real de tu carpeta
    ports:
      - "3000:3000"
    depends_on:
      - db

  frontend:
    build: ./Frontend
    ports:
      - "5000:5000"
    depends_on:
      - backend